name: build-imagen

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_name: windows-amd64
            rust_target: x86_64-pc-windows-msvc
          - os: windows-latest
            target_name: windows-arm64
            rust_target: aarch64-pc-windows-msvc
          - os: ubuntu-latest
            target_name: linux-amd64
            rust_target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target_name: macos-amd64
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            target_name: macos-arm64
            rust_target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build target
        run: node scripts/build-matrix.cjs ${{ matrix.target_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imagen-${{ matrix.target_name }}
          path: |
            dist-release/**

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release assets
        run: |
          mkdir -p release-files
          VERSION="${GITHUB_REF_NAME}"
          cp release-assets/imagen-windows-amd64/*/windows-amd64/imagen.exe "release-files/imagen-${VERSION}-windows-amd64.exe"
          cp release-assets/imagen-windows-arm64/*/windows-arm64/imagen.exe "release-files/imagen-${VERSION}-windows-arm64.exe"
          cp release-assets/imagen-linux-amd64/*/linux-amd64/imagen "release-files/imagen-${VERSION}-linux-amd64"
          cp release-assets/imagen-macos-amd64/*/macos-amd64/imagen "release-files/imagen-${VERSION}-macos-amd64"
          cp release-assets/imagen-macos-arm64/*/macos-arm64/imagen "release-files/imagen-${VERSION}-macos-arm64"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Imagen ${{ github.ref_name }}
          files: release-files/**
          generate_release_notes: true